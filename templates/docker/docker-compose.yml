# Sobe api + web + Caddy (reverse proxy com HTTPS automático).
# Local: `docker compose up --build -d`. Prod (VPS): mesma coisa, com .env.production preenchido.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.production
    environment:
      NODE_ENV: production
      API_PORT: 3001
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env.production
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
