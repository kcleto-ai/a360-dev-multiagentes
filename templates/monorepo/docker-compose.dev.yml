# Infra de DEV em 1 comando: docker compose -f docker-compose.dev.yml up -d
# Sobe Postgres com DOIS bancos: app_dev (desenvolvimento) e app_test (vitest).
# Lição (projeto-origem / LEARNINGS 1.19): test DB separado + migrations aplicadas
# nos dois — senão o smoke dos slots consumidores quebra com "relation does not exist".
#
# (O deploy de produção usa templates/docker/ do plugin — este arquivo é só dev.)

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
